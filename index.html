<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CQ Caja</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1C3D35">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F3EF;font-family:'Space Grotesk',sans-serif;color:#1C2B22;min-height:100vh}
:root{
  --green:#1C3D35;--green2:#2E7D5E;--green3:#7AAF96;
  --sand:#F5F3EF;--sand2:#EDE9E1;--sand3:#D5CFC3;
  --amber:#C8882A;--amberL:#F5E6C8;
  --blue:#2B5EA7;--blueL:#EBF0FA;
  --red:#C0392B;--redL:#FDECEA;
  --mono:'JetBrains Mono',monospace;
  --emilio:#2B7BE0;--juan:#C8882A;
}

.hdr{background:var(--green);padding:12px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
.hdr-ttl{font-size:15px;font-weight:800;color:#fff;letter-spacing:.03em}
.hdr-ttl span{color:var(--green3);font-size:11px;font-weight:500;margin-left:8px}

.tabs{background:#fff;border-bottom:1px solid var(--sand3);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:49px;z-index:100}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:10.5px;font-weight:800;letter-spacing:.03em;color:#9AAE9A;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab-curr{font-size:14px;font-weight:800;margin-left:1px}
.tab.active{border-bottom-width:3px}
.tab[data-c="deuda-pesos"]{color:#5B9BE0}
.tab[data-c="deuda-pesos"].active{color:#2B7BE0;border-bottom-color:#2B7BE0}
.tab[data-c="deuda-usd"]{color:#6FB04A}
.tab[data-c="deuda-usd"].active{color:#3A8A20;border-bottom-color:#3A8A20}
.tab[data-c="fondo-pesos"]{color:#D9A85C}
.tab[data-c="fondo-pesos"].active{color:#C8882A;border-bottom-color:#C8882A}
.tab[data-c="fondo-usd"]{color:#A875C2}
.tab[data-c="fondo-usd"].active{color:#7B3FA0;border-bottom-color:#7B3FA0}
.tab[data-c="santander"]{color:#D87E72}
.tab[data-c="santander"].active{color:#C0392B;border-bottom-color:#C0392B}
.tab[data-c="santander-usd"]{color:#5FAFA0}
.tab[data-c="santander-usd"].active{color:#107A68;border-bottom-color:#107A68}

.main{padding:14px;max-width:760px;margin:0 auto}
.sec-ttl{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--green3);margin-bottom:8px;margin-top:6px}

/* BALANZA — signature element for debt tabs */
.balanza{background:#fff;border:1px solid var(--sand3);border-radius:14px;padding:22px 18px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.balanza-bar{height:10px;border-radius:6px;background:var(--sand2);position:relative;margin:14px 0;overflow:hidden}
.balanza-fill{position:absolute;top:0;height:100%;border-radius:6px;transition:all .4s cubic-bezier(.4,0,.2,1)}
.balanza-names{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:4px}
.balanza-msg{font-size:14px;font-weight:700;color:var(--green);margin-top:10px}
.balanza-msg b{font-family:var(--mono)}
.balanza-sub{font-size:10px;color:#A8BFA8;margin-top:4px}

.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--sand3);border-radius:10px;padding:12px 14px}
.kpi-label{font-size:9px;font-weight:800;color:var(--green3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--green)}
.kpi-sub{font-size:9px;color:#A8BFA8;margin-top:2px}
.kpi.fondo .kpi-val{color:var(--green2)}
.kpi.warn .kpi-val{color:var(--red)}

.card{background:#fff;border:1px solid var(--sand3);border-radius:10px;overflow:hidden;margin-bottom:12px}
.card-hd{padding:10px 14px;border-bottom:1px solid #F0EDE8;display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:12px;font-weight:800;color:var(--green)}

.fld{margin-bottom:10px}
.fld label{display:block;font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--green3);margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;background:#F7F6F3;border:1px solid var(--sand3);border-radius:7px;padding:9px 11px;font-size:13px;font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--green);outline:none;transition:border-color .15s}
.fld input:focus,.fld select:focus{border-color:var(--green2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.payer-chips{display:flex;gap:8px;margin-bottom:10px}
.payer-chip{flex:1;padding:11px;border-radius:9px;border:2px solid var(--sand3);background:#fff;font-size:13px;font-weight:800;cursor:pointer;text-align:center;transition:all .15s}
.payer-chip.active{border-color:var(--green2);background:#EBF7F0;color:var(--green)}

.btn{padding:9px 18px;border-radius:8px;border:none;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.btn-p{background:var(--green);color:#fff}.btn-p:hover{background:var(--green2)}
.btn-s{background:var(--sand2);color:var(--green)}.btn-s:hover{background:var(--sand3)}
.btn-d{background:var(--redL);color:var(--red)}.btn-d:hover{background:#FAD7D4}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-full{width:100%;padding:12px}

.gasto-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #F5F3EF}
.gasto-row:last-child{border-bottom:none}
.gasto-fecha{font-family:var(--mono);font-size:9px;color:#A8BFA8;min-width:58px}
.gasto-main{flex:1;min-width:0}
.gasto-desc{font-size:12px;font-weight:700;color:var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gasto-meta{font-size:10px;color:#A8BFA8;margin-top:1px}
.gasto-tag{display:inline-flex;font-size:9px;font-weight:800;padding:1px 7px;border-radius:20px;margin-right:5px}
.gasto-val{font-family:var(--mono);font-weight:800;font-size:13px;color:var(--green);white-space:nowrap}
.gasto-actions{display:flex;gap:3px}
.icon-btn{background:none;border:none;cursor:pointer;color:#C4D4C4;font-size:13px;padding:2px 4px;transition:color .15s}
.icon-btn:hover{color:var(--green2)}
.icon-btn.del:hover{color:var(--red)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(28,45,34,.5);z-index:400;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal-hd{padding:14px 18px 10px;border-bottom:1px solid #EEF4EE;display:flex;align-items:center;justify-content:space-between}
.modal-ttl{font-weight:800;font-size:14px;color:var(--green)}
.modal-x{background:none;border:none;font-size:18px;cursor:pointer;color:#9AAE9A;line-height:1}
.mbody{padding:16px 18px}
.mfooter{padding:10px 18px 14px;display:flex;gap:8px;justify-content:flex-end}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:700;box-shadow:0 4px 20px rgba(28,61,53,.35);z-index:600;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.empty{padding:26px;text-align:center;color:#A8BFA8;font-size:12px}

@media(max-width:480px){.row2{grid-template-columns:1fr}}

.sync-wrap{display:flex;align-items:center;gap:8px}
.sync-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:4px 9px;font-size:10px;color:#fff;font-weight:800}
.sync-pill.err{background:rgba(192,57,43,.35)}
.activity-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:999px;padding:4px 9px;font-size:10px;font-weight:800;cursor:pointer}
.activity-feed-row{padding:10px 0;border-bottom:1px solid #F0EDE8}
.activity-feed-row:last-child{border-bottom:none}
.activity-feed-txt{font-size:12px;font-weight:700;color:var(--green)}
.activity-feed-date{font-size:10px;color:#A8BFA8;margin-top:3px;font-family:var(--mono)}

</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAf7vM8Og4jSe7QGHQUK-afvuXka9MCKU8",
    authDomain: "cq-mano-de-obra.firebaseapp.com",
    projectId: "cq-mano-de-obra",
    storageBucket: "cq-mano-de-obra.firebasestorage.app",

  const app = initializeApp(firebaseConfig);

  window._cqFirebase = { db, doc, setDoc, getDoc, onSnapshot };

  document.dispatchEvent(new Event("cq-firebase-ready"));
</script>

</head>
<body>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-actividad">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl">Actividad reciente</span><button class="modal-x" onclick="closeModal('modal-actividad')">×</button></div>
    <div class="mbody" id="activity-feed"><div class="empty">Sin actividad reciente</div></div>
  </div>
</div>


<!-- MODAL: gasto con deuda ($/usd) -->
<div class="modal-bg" id="modal-gasto-deuda">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl" id="gd-ttl">Nuevo gasto</span><button class="modal-x" onclick="closeModal('modal-gasto-deuda')">×</button></div>
    <div class="mbody">
      <div class="fld"><label>¿Quién pagó?</label>
        <div class="payer-chips" id="gd-payer-chips"></div>
      </div>
      <div class="fld"><label id="gd-monto-label">Monto $</label><input type="number" id="gd-monto" min="0" step="0.01" placeholder="0"></div>
      <div class="fld"><label>Descripción *</label><input type="text" id="gd-desc" list="dl-desc-deuda" placeholder="ej: Combustible obra 4/100"></div>
      <datalist id="dl-desc-deuda"></datalist>
      <div class="fld"><label>Fecha</label><input type="date" id="gd-fecha"></div>
    </div>
    <div class="mfooter"><button class="btn btn-s btn-sm" onclick="closeModal('modal-gasto-deuda')">Cancelar</button><button class="btn btn-p btn-sm" onclick="guardarGastoDeuda()">Guardar</button></div>
  </div>
</div>

<!-- MODAL: gasto sobre fondo/cuenta (sin deuda) -->
<div class="modal-bg" id="modal-gasto-fondo">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl" id="gf-ttl">Nuevo gasto</span><button class="modal-x" onclick="closeModal('modal-gasto-fondo')">×</button></div>
    <div class="mbody">
      <div class="fld"><label id="gf-monto-label">Monto</label><input type="number" id="gf-monto" min="0" step="0.01" placeholder="0"></div>
      <div class="fld"><label>Descripción *</label><input type="text" id="gf-desc" list="dl-desc-fondo" placeholder="ej: Compra de cemento"></div>
      <datalist id="dl-desc-fondo"></datalist>
      <div class="fld"><label>Fecha</label><input type="date" id="gf-fecha"></div>
    </div>
    <div class="mfooter"><button class="btn btn-s btn-sm" onclick="closeModal('modal-gasto-fondo')">Cancelar</button><button class="btn btn-p btn-sm" onclick="guardarGastoFondo()">Guardar</button></div>
  </div>
</div>

<!-- MODAL: ingreso a fondo/cuenta -->
<div class="modal-bg" id="modal-ingreso">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl" id="ing-ttl">Registrar ingreso</span><button class="modal-x" onclick="closeModal('modal-ingreso')">×</button></div>
    <div class="mbody">
      <div class="fld"><label id="ing-monto-label">Monto</label><input type="number" id="ing-monto" min="0" step="0.01" placeholder="0"></div>
      <div class="fld"><label>Origen / notas *</label><input type="text" id="ing-desc" list="dl-desc-ingreso" placeholder="ej: Aporte de socios"></div>
      <datalist id="dl-desc-ingreso"></datalist>
      <div class="fld"><label>Fecha</label><input type="date" id="ing-fecha"></div>
    </div>
    <div class="mfooter"><button class="btn btn-s btn-sm" onclick="closeModal('modal-ingreso')">Cancelar</button><button class="btn btn-p btn-sm" onclick="guardarIngreso()">Guardar</button></div>
  </div>
</div>


<!-- MODAL: pago parcial de deuda -->
<div class="modal-bg" id="modal-pago-parcial">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl">Pago parcial</span><button class="modal-x" onclick="closeModal('modal-pago-parcial')">×</button></div>
    <div class="mbody">
      <p style="font-size:13px;color:var(--green);line-height:1.5" id="pp-msg"></p>
      <div class="fld" style="margin-top:14px"><label>¿Quién hizo el pago parcial?</label>
        <div class="payer-chips" id="pp-payer-chips"></div>
      </div>
      <div class="fld"><label id="pp-monto-label">Monto</label><input type="number" id="pp-monto" min="0" step="0.01" placeholder="0"></div>
      <div class="fld"><label>Fecha del pago</label><input type="date" id="pp-fecha"></div>
    </div>
    <div class="mfooter"><button class="btn btn-s btn-sm" onclick="closeModal('modal-pago-parcial')">Cancelar</button><button class="btn btn-p btn-sm" onclick="confirmarPagoParcial()">Registrar pago</button></div>
  </div>
</div>

<!-- MODAL: liquidar deuda -->
<div class="modal-bg" id="modal-liquidar">
  <div class="modal">
    <div class="modal-hd"><span class="modal-ttl">Liquidar deuda</span><button class="modal-x" onclick="closeModal('modal-liquidar')">×</button></div>
    <div class="mbody">
      <p style="font-size:13px;color:var(--green);line-height:1.5" id="liquidar-msg"></p>
      <div class="fld" style="margin-top:14px"><label>Fecha del pago</label><input type="date" id="liquidar-fecha"></div>
    </div>
    <div class="mfooter"><button class="btn btn-s btn-sm" onclick="closeModal('modal-liquidar')">Cancelar</button><button class="btn btn-p btn-sm" onclick="confirmarLiquidar()">Confirmar liquidación</button></div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-ttl">CQ Caja <span>Emilio &amp; Juan</span></div>
  <div class="sync-wrap">
    <button class="activity-btn" onclick="openActividad()">Actividad</button>
    <div class="sync-pill" id="sync-status">Sync: conectando...</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-c="deuda-pesos" id="tab-deuda-pesos" onclick="showTab('deuda-pesos')">Deuda <span class="tab-curr">$</span></button>
  <button class="tab" data-c="deuda-usd" id="tab-deuda-usd" onclick="showTab('deuda-usd')">Deuda <span class="tab-curr">u$s</span></button>
  <button class="tab" data-c="fondo-pesos" id="tab-fondo-pesos" onclick="showTab('fondo-pesos')">Fondo común <span class="tab-curr">$</span></button>
  <button class="tab" data-c="fondo-usd" id="tab-fondo-usd" onclick="showTab('fondo-usd')">Fondo común <span class="tab-curr">u$s</span></button>
  <button class="tab" data-c="santander" id="tab-santander" onclick="showTab('santander')">Cta. Santander <span class="tab-curr">$</span></button>
  <button class="tab" data-c="santander-usd" id="tab-santander-usd" onclick="showTab('santander-usd')">Cta. Santander <span class="tab-curr">u$s</span></button>
</div>

<div class="main">

  <!-- ══════════ DEUDA $ ══════════ -->
  <div id="view-deuda-pesos">
    <div class="balanza" id="balanza-pesos"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-full" style="background:#2B7BE0;color:#fff" onclick="openGastoDeuda('pesos')">+ Cargar gasto</button>

      <button class="btn btn-full" style="background:#C8882A;color:#fff" onclick="openGastoFondo('fondo-pesos')">+ Gasto</button>

  <!-- ══════════ FONDO COMÚN U$S ══════════ -->
  <div id="view-fondo-usd" style="display:none">
    <div class="kpi-row" id="kpi-fondo-usd"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-full" style="background:#7B3FA0;color:#fff" onclick="openGastoFondo('fondo-usd')">+ Gasto</button>

    <div class="sec-ttl">Movimientos</div>
    <div id="lista-fondo-usd"></div>
  </div>

  <!-- ══════════ SANTANDER ══════════ -->
  <div id="view-santander" style="display:none">
    <div class="kpi-row" id="kpi-santander"></div>

      <button class="btn btn-full" style="background:#C0392B;color:#fff" onclick="openGastoFondo('santander')">+ Gasto</button>
      <button class="btn btn-s btn-full" onclick="openIngreso('santander')">+ Ingreso</button>
    </div>
    <div class="sec-ttl">Movimientos</div>
    <div id="lista-santander"></div>
  </div>

  <!-- ══════════ SANTANDER U$S ══════════ -->
  <div id="view-santander-usd" style="display:none">
    <div class="kpi-row" id="kpi-santander-usd"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-full" style="background:#107A68;color:#fff" onclick="openGastoFondo('santander-usd')">+ Gasto</button>
      <button class="btn btn-s btn-full" onclick="openIngreso('santander-usd')">+ Ingreso</button>
    </div>
    <div class="sec-ttl">Movimientos</div>
    <div id="lista-santander-usd"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
var SOCIOS=['Emilio','Juan'];
var SOCIO_COLOR_PESOS={'Emilio':'#2B7BE0','Juan':'#C8882A'};
var SOCIO_COLOR_USD={'Emilio':'#1E8DB4','Juan':'#3A8A20'};
function socioColor(moneda,socio){
  return (moneda==='usd'?SOCIO_COLOR_USD:SOCIO_COLOR_PESOS)[socio];
}
var DB_KEY='gastos_cq_v1';
var FIRESTORE_COLLECTION='cq_caja';
var FIRESTORE_DOC_ID='gastos_compartidos_v1';
var firebaseSaving=false, firebaseUnsub=null, saveTimer=null;
var suppressRemoteUntil=0, pendingActivity=null, lastRemoteUpdatedAt=null;
var currentTab='deuda-pesos';

function emptyDB(){
  return {
    deudaPesos:[], deudaUsd:[],
    fondoPesosSaldoInicial:0, fondoPesosMovs:[],
    fondoUsdSaldoInicial:0, fondoUsdMovs:[],
    santanderSaldoInicial:0, santanderMovs:[],
    santanderUsdSaldoInicial:0, santanderUsdMovs:[],
    activity:[]
  };
}
function sanitizeDB(s){
  var base=emptyDB(); s=s||{};
  Object.keys(base).forEach(function(k){
    if(Array.isArray(base[k])) base[k]=Array.isArray(s[k])?s[k]:[];
    else base[k]=parseFloat(s[k])||0;
  });
  base.activity=(base.activity||[]).slice(0,30);
  return base;
}
function loadDB(){
  try{var s=JSON.parse(localStorage.getItem(DB_KEY)||'null');if(s)return sanitizeDB(s);}catch(e){}
  return emptyDB();
}
var DB=loadDB();

function setSyncStatus(txt,err){
  var el=document.getElementById('sync-status');
  if(!el)return;
  el.textContent=txt;
  el.className='sync-pill'+(err?' err':'');
}
function escapeHTML(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}
function formatDateTime(v){
  if(!v)return '';
  var d=new Date(v);
  if(isNaN(d.getTime()))return String(v);
  return d.toLocaleDateString('es-AR')+' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}
function addActivity(text){
  if(!text)return;
  DB.activity=DB.activity||[];
  DB.activity.unshift({id:Date.now(),text:text,at:new Date().toISOString()});
  DB.activity=DB.activity.slice(0,30);
}
function openActividad(){renderActividad();openModal('modal-actividad');}
function renderActividad(){
  var el=document.getElementById('activity-feed');
  if(!el)return;
  var list=(DB.activity||[]).slice(0,30);
  if(!list.length){el.innerHTML='<div class="empty">Sin actividad reciente</div>';return;}
  el.innerHTML=list.map(function(a){
    return '<div class="activity-feed-row"><div class="activity-feed-txt">'+escapeHTML(a.text||'Movimiento')+'</div><div class="activity-feed-date">'+formatDateTime(a.at)+'</div></div>';
  }).join('');
}
function persist(activityText){
  DB=sanitizeDB(DB);
  if(activityText){addActivity(activityText);pendingActivity=activityText;}
  localStorage.setItem(DB_KEY,JSON.stringify(DB));
  scheduleFirebaseSave();
}
function scheduleFirebaseSave(){
  if(!window._cqFirebaseReady||!window._cqFirebase)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveToFirebase,450);
}
async function saveToFirebase(){
  if(!window._cqFirebaseReady||!window._cqFirebase||firebaseSaving)return;
  try{
    firebaseSaving=true;
    setSyncStatus('Sync: guardando...');
    suppressRemoteUntil=Date.now()+1200;
    var f=window._cqFirebase;
    var payload={db:sanitizeDB(DB),updatedAt:new Date().toISOString(),lastActivity:pendingActivity||null};
    await f.setDoc(f.doc(f.db,FIRESTORE_COLLECTION,FIRESTORE_DOC_ID),payload);
    lastRemoteUpdatedAt=payload.updatedAt;
    pendingActivity=null;
    setSyncStatus('Sync: ON');
  }catch(e){console.warn(e);setSyncStatus('Sync: error',true);}
  finally{firebaseSaving=false;}
}
async function loadFromFirebase(){
  if(!window._cqFirebaseReady||!window._cqFirebase)return;
  try{
    setSyncStatus('Sync: cargando...');
    var f=window._cqFirebase;
    var ref=f.doc(f.db,FIRESTORE_COLLECTION,FIRESTORE_DOC_ID);
    var snap=await f.getDoc(ref);
    if(snap.exists()&&snap.data().db){
      DB=sanitizeDB(snap.data().db);
      lastRemoteUpdatedAt=snap.data().updatedAt||null;
      localStorage.setItem(DB_KEY,JSON.stringify(DB));
    }else{
      await f.setDoc(ref,{db:sanitizeDB(DB),updatedAt:new Date().toISOString(),lastActivity:null});
    }
    setSyncStatus('Sync: ON');
    listenFirebase();
    renderCurrent();
  }catch(e){console.warn(e);setSyncStatus('Sync: error',true);renderCurrent();}
}
function listenFirebase(){
  if(firebaseUnsub||!window._cqFirebaseReady||!window._cqFirebase)return;
  var f=window._cqFirebase;
  firebaseUnsub=f.onSnapshot(f.doc(f.db,FIRESTORE_COLLECTION,FIRESTORE_DOC_ID),function(snap){
    if(Date.now()<suppressRemoteUntil)return;
    if(snap.exists()&&snap.data().db){
      var data=snap.data();
      var isNew=lastRemoteUpdatedAt && data.updatedAt && data.updatedAt!==lastRemoteUpdatedAt;
      DB=sanitizeDB(data.db);
      lastRemoteUpdatedAt=data.updatedAt||lastRemoteUpdatedAt;
      localStorage.setItem(DB_KEY,JSON.stringify(DB));
      setSyncStatus('Sync: ON');
      renderCurrent();
      if(isNew && data.lastActivity) toast(data.lastActivity);
    }
  },function(e){console.warn(e);setSyncStatus('Sync: error',true);});
}
document.addEventListener('cq-firebase-ready',loadFromFirebase);
setTimeout(function(){
  if(!window._cqFirebaseReady){setSyncStatus('Sync: local',true);renderCurrent();}
},1800);

function fmtN(n,dec){if(n==null||isNaN(n))return '-';dec=dec!=null?dec:2;return parseFloat(n).toLocaleString('es-AR',{maximumFractionDigits:dec});}
function fmtP(n){return '$'+fmtN(n,0);}
function fmtU(n){return 'u$s '+fmtN(n,2);}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtFecha(iso){if(!iso)return '';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function deudaList(moneda){ return moneda==='pesos'?DB.deudaPesos:DB.deudaUsd; }
function fmtMon(moneda,n){ return moneda==='pesos'?fmtP(n):fmtU(n); }
function labelDeuda(moneda){return moneda==='pesos'?'Deuda $':'Deuda u$s';}
function labelFondo(tipo){
  if(tipo==='fondo-pesos')return 'Fondo común $';
  if(tipo==='fondo-usd')return 'Fondo común u$s';
  if(tipo==='santander-usd')return 'Cuenta Santander u$s';
  return 'Cuenta Santander $';
}


// Calcula cuánto puso cada socio en total, y la diferencia respecto al reparto igual
function calcBalance(moneda){
  var lista=deudaList(moneda);
  var totalPorSocio={}; SOCIOS.forEach(function(s){totalPorSocio[s]=0;});
  lista.forEach(function(g){ totalPorSocio[g.pagador]=(totalPorSocio[g.pagador]||0)+g.monto; });
  var totalGeneral=SOCIOS.reduce(function(s,n){return s+totalPorSocio[n];},0);
  var partePorSocio=totalGeneral/SOCIOS.length;
  // diferencia[socio] = lo que puso - lo que le correspondía. Positivo = le deben.
  var diff={};
  SOCIOS.forEach(function(s){ diff[s]=totalPorSocio[s]-partePorSocio; });
  return {totalPorSocio:totalPorSocio,totalGeneral:totalGeneral,partePorSocio:partePorSocio,diff:diff};
}

function renderBalanza(moneda){
  var b=calcBalance(moneda);
  var el=document.getElementById(moneda==='pesos'?'balanza-pesos':'balanza-usd');
  var s1=SOCIOS[0], s2=SOCIOS[1];
  var d1=b.diff[s1], d2=b.diff[s2];
  var maxAbs=Math.max(Math.abs(d1),Math.abs(d2),1);
  var pct1=50+(d1/maxAbs)*40; // 10-90 range visual
  pct1=Math.max(8,Math.min(92,pct1));

  var msg, sub;
  if(Math.abs(d1)<0.5){
    msg='Están a mano';
    sub='Cada uno aportó '+fmtMon(moneda,b.partePorSocio);
  } else if(d1>0){
    msg=s2+' le debe a '+s1+' <b>'+fmtMon(moneda,Math.abs(d1))+'</b>';
    sub=s1+' puso '+fmtMon(moneda,b.totalPorSocio[s1])+' · '+s2+' puso '+fmtMon(moneda,b.totalPorSocio[s2]);
  } else {
    msg=s1+' le debe a '+s2+' <b>'+fmtMon(moneda,Math.abs(d2))+'</b>';
    sub=s1+' puso '+fmtMon(moneda,b.totalPorSocio[s1])+' · '+s2+' puso '+fmtMon(moneda,b.totalPorSocio[s2]);
  }

  var html='<div class="balanza-names"><span style="color:'+socioColor(moneda,s1)+'">'+s1+'</span><span style="color:'+socioColor(moneda,s2)+'">'+s2+'</span></div>'
    +'<div class="balanza-bar">'
    +'<div class="balanza-fill" style="left:0;width:'+pct1+'%;background:'+socioColor(moneda,s1)+'"></div>'
    +'<div class="balanza-fill" style="left:'+pct1+'%;width:'+(100-pct1)+'%;background:'+socioColor(moneda,s2)+'"></div>'
    +'</div>'
    +'<div class="balanza-msg">'+msg+'</div>'
    +'<div class="balanza-sub">'+sub+'</div>';

  if(Math.abs(d1)>=0.5){
    html+='<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px">'
      +'<button class="btn btn-s btn-sm" onclick="openPagoParcial(\''+moneda+'\')">+ Pago parcial</button>'
      +'<button class="btn btn-s btn-sm" onclick="openLiquidar(\''+moneda+'\')">✓ Marcar como liquidado</button>'
      +'</div>';
  }
  el.innerHTML=html;
}

function renderDeuda(moneda){
  renderBalanza(moneda);
  var lista=deudaList(moneda).slice().sort(function(a,b){return b.fecha.localeCompare(a.fecha)||b.id-a.id;});
  var contId='lista-deuda-'+moneda;
  if(!lista.length){document.getElementById(contId).innerHTML='<div class="card"><div class="empty">Sin gastos registrados</div></div>';return;}
  var rows=lista.map(function(g){
    var isLiq=g.tipo==='liquidacion';
    var isPP=g.tipo==='pago_parcial';
    return '<div class="gasto-row">'
      +'<div class="gasto-fecha">'+fmtFecha(g.fecha)+'</div>'
      +'<div class="gasto-main">'
      +'<div class="gasto-desc">'+(isLiq?'✓ Liquidación':(isPP?'↘ Pago parcial':g.desc||'(sin descripción)'))+'</div>'
      +'<div class="gasto-meta"><span class="gasto-tag" style="background:'+socioColor(moneda,g.pagador)+';color:#fff">'+g.pagador+'</span>'+(isLiq?'pagó la diferencia':(isPP?'pagó parcialmente':'pagó'))+'</div>'
      +'</div>'
      +'<div class="gasto-val">'+fmtMon(moneda,g.monto)+'</div>'
      +'<div class="gasto-actions">'
      +((isLiq||isPP)?'':'<button class="icon-btn" onclick="openEditDeuda(\''+moneda+'\','+g.id+')">✎</button>')
      +'<button class="icon-btn del" onclick="borrarDeuda(\''+moneda+'\','+g.id+')">✕</button>'
      +'</div>'
      +'</div>';
  }).join('');
  document.getElementById(contId).innerHTML='<div class="card">'+rows+'</div>';
}

function openGastoDeuda(moneda){

function selectPayer(btn){
  btn.parentElement.querySelectorAll('.payer-chip').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}
function openEditDeuda(moneda,id){
  gdMoneda=moneda; gdEditId=id;
  var g=deudaList(moneda).find(function(x){return x.id===id;});
  if(!g) return;
  document.getElementById('gd-ttl').textContent='Editar gasto';
  document.getElementById('gd-monto-label').textContent='Monto '+(moneda==='pesos'?'$':'u$s');

  }).join('');

function guardarGastoDeuda(){
  var monto=parseFloat(document.getElementById('gd-monto').value);
  var desc=document.getElementById('gd-desc').value.trim();
  var fecha=document.getElementById('gd-fecha').value;
  var activeBtn=document.querySelector('#gd-payer-chips .payer-chip.active');
  var pagador=activeBtn?activeBtn.dataset.s:SOCIOS[0];
  if(!monto||monto<=0){alert('Ingresá un monto válido');return;}
  if(!desc){alert('Ingresá una descripción');return;}
  if(!fecha){alert('Seleccioná una fecha');return;}
  var lista=deudaList(gdMoneda);
  if(gdEditId){
    var idx=lista.findIndex(function(x){return x.id===gdEditId;});
    if(idx>=0) lista[idx]=Object.assign({},lista[idx],{monto:monto,desc:desc,fecha:fecha,pagador:pagador});
    toast('✓ Gasto actualizado');
    persist('Se modificó un gasto de '+fmtMon(gdMoneda,monto)+' en '+labelDeuda(gdMoneda));
  } else {
    lista.push({id:Date.now(),tipo:'gasto',monto:monto,desc:desc,fecha:fecha,pagador:pagador});
    toast('✓ Gasto registrado: '+fmtMon(gdMoneda,monto));
    persist('Se cargó un gasto de '+fmtMon(gdMoneda,monto)+' en '+labelDeuda(gdMoneda));
  }
  closeModal('modal-gasto-deuda');renderDeuda(gdMoneda);
}
function borrarDeuda(moneda,id){
  var lista=deudaList(moneda);
  var idx=lista.findIndex(function(x){return x.id===id;});
  if(idx>=0) lista.splice(idx,1);
  persist('Se eliminó un movimiento en '+labelDeuda(moneda));toast('Eliminado');renderDeuda(moneda);
}


var ppMoneda=null;
function openPagoParcial(moneda){
  ppMoneda=moneda;
  var b=calcBalance(moneda);
  var s1=SOCIOS[0],s2=SOCIOS[1];
  var d1=b.diff[s1];
  var deudor = d1>0?s2:s1;
  var acreedor = d1>0?s1:s2;
  var saldo=Math.abs(d1);
  if(saldo<0.5){
    document.getElementById('pp-msg').innerHTML='No hay deuda pendiente. Si registrás un pago parcial, se generará una nueva diferencia entre socios.';
  }else{
    document.getElementById('pp-msg').innerHTML='<b>'+deudor+'</b> le debe a <b>'+acreedor+'</b> '+fmtMon(moneda,saldo)+'. Podés registrar un pago de cualquiera de los dos socios: si paga quien debe, baja la deuda; si paga el otro, la deuda aumenta.';
  }
  document.getElementById('pp-payer-chips').innerHTML=SOCIOS.map(function(s,i){
    var active = (s===deudor || (saldo<0.5 && i===0)) ? ' active' : '';
    return '<button class="payer-chip'+active+'" data-s="'+s+'" onclick="selectPayer(this)">'+s+'</button>';
  }).join('');
  document.getElementById('pp-monto-label').textContent='Monto '+(moneda==='pesos'?'$':'u$s');
  document.getElementById('pp-monto').value='';
  document.getElementById('pp-fecha').value=todayISO();
  openModal('modal-pago-parcial');
}
function confirmarPagoParcial(){
  var moneda=ppMoneda;
  var monto=parseFloat(document.getElementById('pp-monto').value);
  var fecha=document.getElementById('pp-fecha').value||todayISO();
  var activeBtn=document.querySelector('#pp-payer-chips .payer-chip.active');
  var pagador=activeBtn?activeBtn.dataset.s:SOCIOS[0];
  if(!monto||monto<=0){alert('Ingresá un monto válido');return;}
  deudaList(moneda).push({id:Date.now(),tipo:'pago_parcial',monto:monto,desc:'Pago parcial de saldo',fecha:fecha,pagador:pagador});
  persist('Se cargó un pago parcial de '+fmtMon(moneda,monto)+' en '+labelDeuda(moneda));
  closeModal('modal-pago-parcial');
  toast('✓ Pago parcial registrado');
  renderDeuda(moneda);
}

var liqMoneda=null;
function openLiquidar(moneda){
  liqMoneda=moneda;

function confirmarLiquidar(){

// ═══════════════════════════════════════════
// FONDO COMÚN $ / U$S / SANTANDER (sin deuda)
// ═══════════════════════════════════════════
function fondoConfig(tipo){
  if(tipo==='fondo-pesos') return {movs:'fondoPesosMovs',saldoInit:'fondoPesosSaldoInicial',fmt:fmtP,label:'$',titulo:'Fondo común $',accent:'#C8882A',accentL:'#F5E6C8'};
  if(tipo==='fondo-usd') return {movs:'fondoUsdMovs',saldoInit:'fondoUsdSaldoInicial',fmt:fmtU,label:'u$s',titulo:'Fondo común u$s',accent:'#7B3FA0',accentL:'#F0E5F7'};
  if(tipo==='santander-usd') return {movs:'santanderUsdMovs',saldoInit:'santanderUsdSaldoInicial',fmt:fmtU,label:'u$s',titulo:'Cuenta Santander u$s',accent:'#107A68',accentL:'#E2F2EE'};
  return {movs:'santanderMovs',saldoInit:'santanderSaldoInicial',fmt:fmtP,label:'$',titulo:'Cuenta Santander',accent:'#C0392B',accentL:'#FDECEA'};
}
function fondoSaldo(tipo){
  var cfg=fondoConfig(tipo);
  var movs=DB[cfg.movs]||[];
  var saldo=DB[cfg.saldoInit]||0;
  movs.forEach(function(m){ saldo += m.tipo==='ingreso'?m.monto:-m.monto; });
  return saldo;
}
function renderFondo(tipo){
  var cfg=fondoConfig(tipo);
  var movs=(DB[cfg.movs]||[]).slice().sort(function(a,b){return a.fecha.localeCompare(b.fecha)||a.id-b.id;});
  var saldo=fondoSaldo(tipo);
  var totalIngresos=(DB[cfg.saldoInit]||0)+movs.filter(function(m){return m.tipo==='ingreso';}).reduce(function(s,m){return s+m.monto;},0);
  var totalGastos=movs.filter(function(m){return m.tipo==='gasto';}).reduce(function(s,m){return s+m.monto;},0);

  var kpiId='kpi-'+tipo;
  document.getElementById(kpiId).innerHTML=
    '<div class="kpi fondo" style="border-color:'+cfg.accent+'33"><div class="kpi-label" style="color:'+cfg.accent+'">Saldo actual</div><div class="kpi-val" style="color:'+cfg.accent+'">'+cfg.fmt(saldo)+'</div><div class="kpi-sub">'+cfg.titulo+'</div></div>'
    +'<div class="kpi'+(saldo<0?' warn':'')+'"><div class="kpi-label">Total gastado</div><div class="kpi-val">'+cfg.fmt(totalGastos)+'</div><div class="kpi-sub">'+movs.filter(function(m){return m.tipo==='gasto';}).length+' gastos</div></div>';

  var listaId='lista-'+tipo;
  var sortedDesc=movs.slice().sort(function(a,b){return b.fecha.localeCompare(a.fecha)||b.id-a.id;});
  if(!sortedDesc.length && !(DB[cfg.saldoInit])){
    document.getElementById(listaId).innerHTML='<div class="card"><div class="empty">Sin movimientos. Usá "+ Ingreso" para cargar el saldo inicial.</div></div>';
    return;
  }
  var rows=sortedDesc.map(function(m){
    var isIng=m.tipo==='ingreso';
    return '<div class="gasto-row">'
      +'<div class="gasto-fecha">'+fmtFecha(m.fecha)+'</div>'
      +'<div class="gasto-main"><div class="gasto-desc">'+(m.desc||(isIng?'Ingreso':'Gasto'))+'</div>'
      +'<div class="gasto-meta"><span class="gasto-tag" style="background:'+(isIng?'#EBF7F0':cfg.accentL)+';color:'+(isIng?'#0A6E3A':cfg.accent)+'">'+(isIng?'INGRESO':'GASTO')+'</span></div></div>'
      +'<div class="gasto-val" style="color:'+(isIng?'#0A6E3A':cfg.accent)+'">'+(isIng?'+':'-')+cfg.fmt(m.monto)+'</div>'
      +'<div class="gasto-actions"><button class="icon-btn" onclick="openEditFondoMov(\''+tipo+'\','+m.id+')">✎</button><button class="icon-btn del" onclick="borrarFondoMov(\''+tipo+'\','+m.id+')">✕</button></div>'
      +'</div>';
  }).join('');
  document.getElementById(listaId).innerHTML='<div class="card">'+rows+'</div>';
}

var gfTipo=null, gfEditId=null;
function openGastoFondo(tipo){
  gfTipo=tipo; gfEditId=null;
  var cfg=fondoConfig(tipo);
  document.getElementById('gf-ttl').textContent='Nuevo gasto · '+cfg.titulo;
  document.getElementById('gf-monto-label').textContent='Monto '+cfg.label;
  document.getElementById('gf-monto').value='';
  document.getElementById('gf-desc').value='';
  document.getElementById('gf-fecha').value=todayISO();
  fillDatalists();
  openModal('modal-gasto-fondo');
}
function openEditFondoMov(tipo,id){
  var cfg=fondoConfig(tipo);
  var m=(DB[cfg.movs]||[]).find(function(x){return x.id===id;});
  if(!m) return;
  if(m.tipo==='ingreso'){
    gfTipo=null;
    openEditIngreso(tipo,id);
    return;
  }
  gfTipo=tipo; gfEditId=id;
  document.getElementById('gf-ttl').textContent='Editar gasto';
  document.getElementById('gf-monto-label').textContent='Monto '+cfg.label;
  document.getElementById('gf-monto').value=m.monto;
  document.getElementById('gf-desc').value=m.desc;
  document.getElementById('gf-fecha').value=m.fecha;
  fillDatalists();
  openModal('modal-gasto-fondo');
}
function guardarGastoFondo(){
  var monto=parseFloat(document.getElementById('gf-monto').value);
  var desc=document.getElementById('gf-desc').value.trim();
  var fecha=document.getElementById('gf-fecha').value;
  if(!monto||monto<=0){alert('Ingresá un monto válido');return;}
  if(!desc){alert('Ingresá una descripción');return;}
  if(!fecha){alert('Seleccioná una fecha');return;}
  var cfg=fondoConfig(gfTipo);
  if(!DB[cfg.movs])DB[cfg.movs]=[];
  if(gfEditId){
    var idx=DB[cfg.movs].findIndex(function(x){return x.id===gfEditId;});
    if(idx>=0) DB[cfg.movs][idx]=Object.assign({},DB[cfg.movs][idx],{monto:monto,desc:desc,fecha:fecha});
    toast('✓ Gasto actualizado');
    persist('Se modificó un gasto de '+cfg.fmt(monto)+' en '+labelFondo(gfTipo));
  } else {
    DB[cfg.movs].push({id:Date.now(),tipo:'gasto',monto:monto,desc:desc,fecha:fecha});
    toast('✓ Gasto registrado: '+cfg.fmt(monto));
    persist('Se cargó un gasto de '+cfg.fmt(monto)+' en '+labelFondo(gfTipo));
  }
  closeModal('modal-gasto-fondo');renderFondo(gfTipo);
}
